name: Promote dev to main

on:
    push:
        branches:
            - dev

permissions:
    contents: read
    pull-requests: write

jobs:
    promote:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  ref: dev
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Create Pull Request
              uses: peter-evans/create-pull-request@v7
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  base: main
                  branch: dev
                  title: "Promote dev → main"
                  body: "Automated promotion PR"
