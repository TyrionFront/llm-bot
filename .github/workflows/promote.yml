name: Promote dev to main

on:
    push:
        branches:
            - dev

permissions:
    contents: read
    pull-requests: write

jobs:
    promote:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Create Pull Request
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh pr create \
                    --base main \
                    --head dev \
                    --title "Promote dev → main" \
                    --body "Automated promotion PR" \
                    --repo ${{ github.repository }} || echo "PR already exists, skipping"
