name: Promote dev to main

on:
    push:
        branches:
            - dev

jobs:
    promote:
        runs-on: ubuntu-latest
        steps:
            - name: Create Pull Request
              uses: peter-evans/create-pull-request@v6
              with:
                  base: main
                  branch: dev
                  title: "Promote dev → main"
                  body: "Automated promotion PR"
